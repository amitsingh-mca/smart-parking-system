
<!doctype html><html><head><title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></head>
<body><div class="container mt-4">
<h2 class="text-primary">Smart Parking Dashboard</h2>
<div class="row"><div class="col">Occupied: {{occ}}</div><div class="col">Free: {{free}}</div></div>
<canvas id="c" height="80"></canvas>
<script>
new Chart(document.getElementById('c'),{type:'pie',data:{labels:['Occupied','Free'],datasets:[{data:[{{occ}},{{free}}]}]}});
</script>
<table class="table mt-4"><tr><th>Slot</th><th>Status</th><th>Vehicle</th><th>Action</th></tr>
{% for s in slots %}
<tr><td>{{s.id}}</td><td>{{'Occupied' if s.occupied else 'Free'}}</td><td>{{s.vehicle}}</td><td>
{% if not s.occupied %}
<form method="post" action="/park/{{s.id}}"><input name="vehicle" placeholder="Vehicle No"><button class="btn btn-sm btn-primary">Park</button></form>
{% else %}
<a href="/exit/{{s.id}}" class="btn btn-sm btn-danger">Exit</a>
{% endif %}
</td></tr>
{% endfor %}
</table></div></body></html>
